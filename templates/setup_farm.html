<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setup Your Farm - SFA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #12111a; }
    </style>
</head>
<body class="bg-[#12111a] text-[#E8EAF0]">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full p-8 bg-[#14131b] rounded-2xl border border-gray-800">
            <div class="text-center mb-8">
                <div class="text-4xl mb-3">🌱</div>
                <h1 class="text-2xl font-bold">Welcome to SFA</h1>
                <p class="text-gray-400 mt-2">Let's set up your farm</p>
            </div>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Farm Name</label>
                    <input type="text" name="farm_name" placeholder="e.g., Green Valley Farm" required 
                           class="w-full p-3 bg-[#1f1e2a] rounded-lg border border-gray-700 focus:border-[#b188ea] focus:outline-none">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-400 text-sm mb-2">Location</label>
                    <input type="text" name="location" placeholder="e.g., Cairo, Egypt" required 
                           class="w-full p-3 bg-[#1f1e2a] rounded-lg border border-gray-700 focus:border-[#b188ea] focus:outline-none">
                </div>
                
                <button type="submit" class="w-full bg-[#b188ea] text-black py-3 rounded-lg font-semibold hover:opacity-90 transition">
                    Start Farming
                </button>
            </form>
        </div>
    </div>
</body>
</html>
