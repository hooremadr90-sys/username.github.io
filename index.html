<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App  - Easy Tutorials</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class= "card"> 
    <div class="search">
        <input type="text" placeholder="Enter City Name" spellcheck="false">
        <button><img src="images/search.png" alt="Search"></button>
    </div>  
    <div class = "error">
        <p>city not found</p>
    </div>
    <div class="weather">
        <img src="images/rain.png" class="weather-icon" >
        <h1 class="temp">25°C</h1>
        <h2 class="city">New York</h2>
        
        <div class="details">
            
            <div class="col">
                <img src="images/humidity.png">
                <div>
                    <p class="humidity">80%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="images/wind.png">
                <div>
                    <p class="wind">15 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
<script>
const apiKey = "bb86e4040712455bbfa81411260307";
const apiUrl = "https://api.weatherapi.com/v1/current.json?key=";

const searchBox=document.querySelector(".search input"); // Selecting the input element inside the search class and storing it in the searchBox variable.
const searchBtn = document.querySelector(".search button"); // Selecting the button element inside the search class and storing it in the searchBtn variable.


async function checkWeather(city) {
    const response = await fetch(apiUrl + apiKey + "&q=" + city);
    //async function is used to make the function asynchronous, which means it will wait for the fetch() method to complete before moving on to the next line of code. The fetch() method is used to make a request to the API and retrieve the weather data for the specified city.
    //await is used to wait for the response from the API before moving on to the next line of code. This ensures that the data is fully loaded before we try to access it.
    const data = await response .json(); // Converting the response to JSON format. that javavscript can understand.json() is a way to orgnize the data in a structured format.
   if(data.error){
        document.querySelector(".error").style.display = "block"; 
        document.querySelector(".weather").style.display = "none";
        return; 
    }
    // Success: hide the error message
document.querySelector(".error").style.display = "none";
document.querySelector(".weather").style.display = "block";
     
    document.querySelector(".city").innerHTML= data.location.name; // Displaying the city name in the HTML element with the class "city".
     
    document.querySelector(".temp").innerHTML= Math.round(data.current.temp_c) + "°C"; // Displaying the temperature in the HTML element with the class "temp". Math.round() is used to round the temperature to the nearest whole number.

    document.querySelector(".humidity").innerHTML= data.current.humidity + "%"; // Displaying the humidity in the HTML element with the class "humidity".

   document.querySelector(".wind").innerHTML =data.current.wind_kph + " km/h";
     
   const weatherIcon = document.querySelector(".weather-icon");
   weatherIcon.src = "https:" + data.current.condition.icon; // Displaying the weather icon in the HTML element with the class "weather-icon". The icon is retrieved from the API response and added to the src attribute of the image element.
   document.querySelector(".weather").style.display = "block";//

}

searchBtn.addEventListener("click",()=> {
    console.log("Button clicked"); 
    checkWeather(searchBox.value); // Calling the checkWeather function with the value entered in the search box when the search button is clicked.
});

</script>

</body>
</html>
